shell = { program = "/bin/bash", args = ["--login"] }

import = [
  "/Users/charlie/.config/alacritty/themes/themes/catppuccin-mocha.toml",
]

[env]
TERM = "xterm-256color"

[font]
size = 25

[font.normal]
family = "UbuntuMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "UbuntuMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "UbuntuMono Nerd Font Mono"
style = "Italic"

[window]
decorations = "none"

[window.padding]
x = 7
y = 0
