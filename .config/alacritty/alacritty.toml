shell = { program = "/bin/bash", args = ["--login"] }

import = [
  "/home/charlie/.config/alacritty/themes/themes/tokyonight_night.toml",
]

# [env]
# TERM = "xterm-256color"

[font]
size = 16

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[window]
decorations = "full"
startup_mode = "maximized"

[window.padding]
x = 7
y = 0
